services:
  chiploop-runner:
    image: ghcr.io/chiploop/chiploop-runner:${CHIPLOOP_IMAGE_TAG:-latest}
    container_name: chiploop-runner
    restart: unless-stopped
    env_file:
      - .env.runner
    volumes:
      - ./tool_profile.json:/etc/chiploop/tool_profile.json:ro
      - ./model_profile.json:/etc/chiploop/model_profile.json:ro
      - ./work:/var/lib/chiploop/work
      - ./artifacts:/var/lib/chiploop/artifacts
      # Customer-managed mounts. Update these paths for internal EDA installs.
      # - /eda:/eda:ro
      # - /pdk:/pdk:ro
      # - /repos:/repos:ro
    healthcheck:
      test: ["CMD", "python", "-m", "chiploop_sdk.runner_healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3

