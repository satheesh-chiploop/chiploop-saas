name: Hybrid Backend Release

on:
  push:
    tags:
      - "hybrid-backend-v*"

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/chiploop-backend
          tags: |
            type=ref,event=tag

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true

      - uses: sigstore/cosign-installer@v3.8.2

      - name: Sign image
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/chiploop-backend
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Write release digest
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/chiploop-backend
          DIGEST: ${{ steps.build.outputs.digest }}
        run: echo "${IMAGE}@${DIGEST}" > hybrid-backend-image-digest.txt

      - uses: actions/upload-artifact@v4
        with:
          name: hybrid-backend-image-digest
          path: hybrid-backend-image-digest.txt
